name: Nightly

# Runs the opt-in interop suites that are too heavy for every-commit CI:
# stress (large payload, scale, throughput), fault (toxiproxy), and chain
# (two-router topology). Each job brings up its own docker compose so a
# crash in one suite does not poison the others.
#
# Schedule fires at 07:17 UTC daily (a mid-off-peak window) plus on manual
# dispatch so a maintainer can reproduce a failure without waiting.

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

jobs:
  interop-stress:
    runs-on: ubuntu-latest
    # Two sequential `go test` steps capped at 10m each = 20m of test
    # budget; the rest is `make interop-up` (build + image pull) and
    # general CI overhead.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26"
          check-latest: true
      - run: make interop-up
      # Run interop and stress as separate `go test` invocations. Running
      # them in one command lets `go test` execute the two packages in
      # parallel against the same zenohd, which reliably trips a zenohd
      # 1.0.0 panic (`Invalid Key Expr "$stressord"`, resource.rs:597)
      # under concurrent declare/undeclare.
      - run: go test -race -tags interop -count=1 -timeout 10m -v ./tests/interop/...
      - run: go test -race -tags "interop stress" -count=1 -timeout 10m -v ./tests/stress/...
      - if: always()
        run: make interop-down

  interop-fault:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26"
          check-latest: true
      - run: make interop-fault-up
      - run: go test -race -tags "interop fault" -count=1 -timeout 10m -run 'Fault' -v ./tests/interop/...
      - if: always()
        run: make interop-fault-down

  interop-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26"
          check-latest: true
      - run: make interop-chain-up
      - run: go test -race -tags "interop chain" -count=1 -timeout 5m -run 'Chain' -v ./tests/interop/...
      - if: always()
        run: make interop-chain-down
