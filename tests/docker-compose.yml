services:
  zenohd:
    image: eclipse/zenoh:1.0.0
    ports:
      - "7447:7447"
    command: ["--no-multicast-scouting"]
    environment:
      RUST_LOG: "zenoh=info"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7447"]
      interval: 2s
      timeout: 2s
      retries: 15

  python:
    build:
      context: ./interop
    depends_on:
      zenohd:
        condition: service_healthy
    volumes:
      - ./interop:/work
    working_dir: /work
    environment:
      ZENOH_ENDPOINTS: "tcp/zenohd:7447"
      PYTHONUNBUFFERED: "1"
