services:
  zenohd:
    image: eclipse/zenoh:1.0.0
    ports:
      - "7447:7447"
    command: ["--no-multicast-scouting"]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7447"]
      interval: 2s
      timeout: 2s
      retries: 15

  python:
    image: python:3.12-slim
    depends_on:
      zenohd:
        condition: service_healthy
    volumes:
      - ./interop:/work
    working_dir: /work
    command: ["sleep", "infinity"]
    environment:
      ZENOH_ENDPOINTS: "tcp/zenohd:7447"
